<!-- Experiment Design Trainer — a LeetCode-style concept tracker for DS interview prep -->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Experiment Design Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#EEF0F4;
    --surface:#FFFFFF;
    --rail:#12141C;
    --rail-2:#1B1E2A;
    --rail-3:#262A3A;
    --rail-ink:#E8EAF2;
    --rail-soft:#8B90A6;
    --ink:#181A21;
    --ink-soft:#5C6275;
    --ink-faint:#878DA0;
    --line:#E4E6EE;
    --line-soft:#EFF1F6;
    --accent:#5849E0;
    --accent-soft:#EEEBFC;
    --mastered:#138A63;
    --mastered-soft:#E2F3EC;
    --learning:#C0780E;
    --learning-soft:#FBF0DC;
    --todo:#9AA0B4;
    --trap:#CE2E55;
    --trap-soft:#FBE7ED;
    --radius:14px;
    --shadow:0 1px 2px rgba(20,22,34,.05), 0 8px 24px -12px rgba(20,22,34,.18);
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --display:'Space Grotesk',sans-serif;
    --body:'Inter',system-ui,sans-serif;
  }

  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:var(--body);
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    line-height:1.55;
  }
  .app{
    display:grid;
    grid-template-columns:380px 1fr;
    height:100vh;
    min-height:0;
  }

  /* ---------- RAIL (left) ---------- */
  .rail{
    background:var(--rail);
    color:var(--rail-ink);
    display:flex;
    flex-direction:column;
    min-height:0;
    border-right:1px solid #000;
  }
  .rail-head{
    padding:22px 22px 16px;
    border-bottom:1px solid var(--rail-3);
  }
  .brand{
    display:flex;align-items:baseline;gap:10px;
  }
  .brand .mark{
    font-family:var(--mono);
    font-size:12px;font-weight:600;letter-spacing:.5px;
    color:#000;background:var(--rail-ink);
    padding:3px 7px;border-radius:6px;
  }
  .brand h1{
    font-family:var(--display);
    font-size:18px;font-weight:600;letter-spacing:-.01em;margin:0;
    color:var(--rail-ink);
  }
  .brand .sub{
    display:block;font-size:11px;color:var(--rail-soft);
    font-family:var(--mono);letter-spacing:.3px;margin-top:2px;
  }

  /* confidence bar — the signature CI motif */
  .conf{
    margin-top:18px;
  }
  .conf-top{
    display:flex;justify-content:space-between;align-items:baseline;
    font-size:11px;color:var(--rail-soft);
    font-family:var(--mono);letter-spacing:.4px;text-transform:uppercase;
    margin-bottom:7px;
  }
  .conf-top b{color:var(--rail-ink);font-weight:600}
  .conf-bar{
    height:8px;border-radius:99px;background:var(--rail-3);
    display:flex;overflow:hidden;
  }
  .conf-seg{height:100%;transition:width .4s ease}
  .conf-seg.m{background:var(--mastered)}
  .conf-seg.l{background:var(--learning)}
  .conf-legend{
    display:flex;gap:14px;margin-top:9px;
    font-size:10.5px;font-family:var(--mono);color:var(--rail-soft);
  }
  .conf-legend span{display:flex;align-items:center;gap:5px}
  .dot{width:8px;height:8px;border-radius:99px;flex:none}
  .dot.m{background:var(--mastered)}
  .dot.l{background:var(--learning)}
  .dot.t{background:var(--todo)}

  .rail-controls{padding:14px 22px;border-bottom:1px solid var(--rail-3)}
  .search{
    width:100%;background:var(--rail-2);border:1px solid var(--rail-3);
    color:var(--rail-ink);border-radius:9px;padding:9px 12px;
    font-family:var(--body);font-size:13.5px;outline:none;
  }
  .search::placeholder{color:var(--rail-soft)}
  .search:focus{border-color:var(--accent)}
  .filters{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
  .chip{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.3px;
    padding:5px 9px;border-radius:7px;cursor:pointer;
    background:var(--rail-2);color:var(--rail-soft);
    border:1px solid transparent;white-space:nowrap;
    transition:background .15s,color .15s;
  }
  .chip:hover{color:var(--rail-ink)}
  .chip.on{background:var(--rail-ink);color:#000;font-weight:600}

  .list{flex:1;overflow-y:auto;padding:8px 12px 30px}
  .grp-label{
    font-family:var(--mono);font-size:10px;letter-spacing:1px;
    text-transform:uppercase;color:var(--rail-soft);
    padding:14px 10px 6px;
  }
  .item{
    position:relative;display:flex;align-items:flex-start;gap:11px;
    padding:11px 12px 11px 14px;border-radius:10px;cursor:pointer;
    border:1px solid transparent;
  }
  .item:hover{background:var(--rail-2)}
  .item.active{background:var(--rail-2);border-color:var(--rail-3)}
  .item .spine{
    position:absolute;left:3px;top:12px;bottom:12px;width:3px;
    border-radius:99px;background:var(--todo);
  }
  .item[data-st="learning"] .spine{background:var(--learning)}
  .item[data-st="mastered"] .spine{background:var(--mastered)}
  .item .num{
    font-family:var(--mono);font-size:11px;color:var(--rail-soft);
    margin-top:1px;min-width:22px;
  }
  .item .body{min-width:0}
  .item .t{
    font-size:13.5px;font-weight:500;color:var(--rail-ink);
    line-height:1.35;
  }
  .item .meta{
    font-family:var(--mono);font-size:10px;color:var(--rail-soft);
    margin-top:4px;letter-spacing:.2px;
  }
  .item .check{
    margin-left:auto;font-size:13px;flex:none;margin-top:1px;opacity:.9;
  }

  /* ---------- WORKSHEET (right) ---------- */
  .sheet{overflow-y:auto;min-height:0}
  .sheet-inner{max-width:780px;margin:0 auto;padding:40px 48px 120px}

  .crumbs{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    font-family:var(--mono);font-size:11px;color:var(--ink-faint);
    letter-spacing:.3px;margin-bottom:18px;
  }
  .tag{
    padding:4px 9px;border-radius:7px;font-weight:500;
    background:var(--accent-soft);color:var(--accent);
  }
  .tag.diff{background:var(--line-soft);color:var(--ink-soft)}
  .tag.diff[data-d="Hard"]{background:var(--trap-soft);color:var(--trap)}
  .tag.diff[data-d="Reflex"]{background:#EAF6F0;color:var(--mastered)}

  .q-title{
    font-family:var(--display);font-weight:600;font-size:15px;
    color:var(--ink-faint);letter-spacing:.04em;text-transform:uppercase;
    margin:0 0 6px;
  }
  .prompt{
    font-family:var(--display);font-size:26px;line-height:1.32;
    font-weight:500;letter-spacing:-.015em;margin:0 0 4px;color:var(--ink);
  }

  .why{
    margin:22px 0 0;padding:16px 18px;border-radius:12px;
    background:var(--surface);border:1px solid var(--line);
    box-shadow:var(--shadow);
  }
  .why .lab{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.8px;
    text-transform:uppercase;color:var(--accent);font-weight:600;
    margin-bottom:6px;
  }
  .why p{margin:0;font-size:14.5px;color:var(--ink-soft);line-height:1.6}

  .scratch{margin-top:26px}
  .scratch .lab{
    display:flex;align-items:center;justify-content:space-between;
    font-family:var(--mono);font-size:11px;letter-spacing:.5px;
    text-transform:uppercase;color:var(--ink-faint);margin-bottom:8px;
  }
  .scratch .lab .saved{color:var(--mastered);opacity:0;transition:opacity .3s;text-transform:none;letter-spacing:0}
  .scratch .lab .saved.show{opacity:1}
  textarea{
    width:100%;min-height:110px;resize:vertical;
    font-family:var(--body);font-size:14.5px;line-height:1.6;
    padding:14px 16px;border-radius:12px;border:1px solid var(--line);
    background:var(--surface);color:var(--ink);outline:none;
  }
  textarea:focus{border-color:var(--accent)}
  textarea::placeholder{color:var(--ink-faint)}

  .reveal-btn{
    margin-top:18px;display:inline-flex;align-items:center;gap:9px;
    font-family:var(--display);font-size:14px;font-weight:600;
    background:var(--ink);color:#fff;border:none;cursor:pointer;
    padding:11px 20px;border-radius:11px;letter-spacing:.01em;
    transition:transform .12s,background .15s;
  }
  .reveal-btn:hover{background:#000}
  .reveal-btn:active{transform:translateY(1px)}
  .reveal-btn .kbd{
    font-family:var(--mono);font-size:10px;background:rgba(255,255,255,.16);
    padding:2px 6px;border-radius:5px;
  }

  .answer{display:none;margin-top:30px}
  .answer.show{display:block;animation:rise .35s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .sec-rule{
    display:flex;align-items:center;gap:14px;margin:34px 0 16px;
  }
  .sec-rule:first-child{margin-top:0}
  .sec-rule .lab{
    font-family:var(--mono);font-size:10.5px;letter-spacing:1px;
    text-transform:uppercase;color:var(--ink-faint);white-space:nowrap;
  }
  .sec-rule .ln{flex:1;height:1px;background:var(--line)}

  .answer h4{
    font-family:var(--display);font-size:14.5px;font-weight:600;
    margin:22px 0 8px;color:var(--ink);
  }
  .answer p{margin:0 0 13px;font-size:15px;line-height:1.68;color:#23262F}
  .answer code{
    font-family:var(--mono);font-size:.86em;background:var(--line-soft);
    padding:2px 6px;border-radius:5px;color:#3A2FB0;white-space:nowrap;
  }
  .answer b{font-weight:600;color:var(--ink)}

  .steps{counter-reset:s;margin:4px 0 14px;padding:0;list-style:none}
  .steps li{
    position:relative;padding:11px 14px 11px 46px;margin-bottom:7px;
    border-radius:10px;background:var(--surface);border:1px solid var(--line);
    font-size:14.5px;line-height:1.55;
  }
  .steps li::before{
    counter-increment:s;content:counter(s);
    position:absolute;left:13px;top:11px;
    width:22px;height:22px;border-radius:7px;
    background:var(--accent-soft);color:var(--accent);
    font-family:var(--mono);font-size:11px;font-weight:600;
    display:flex;align-items:center;justify-content:center;
  }
  .steps li b{display:block;margin-bottom:1px}

  .bullets{margin:0 0 14px;padding-left:0;list-style:none}
  .bullets li{
    position:relative;padding:3px 0 3px 22px;font-size:14.5px;
    line-height:1.6;color:#23262F;
  }
  .bullets li::before{
    content:"";position:absolute;left:4px;top:11px;
    width:6px;height:6px;border-radius:99px;background:var(--accent);
  }

  .callout{
    margin:4px 0 16px;padding:14px 16px 14px 18px;border-radius:11px;
    font-size:14px;line-height:1.6;position:relative;
    border:1px solid var(--line);background:var(--surface);
  }
  .callout::before{
    content:"";position:absolute;left:0;top:10px;bottom:10px;width:4px;
    border-radius:99px;
  }
  .callout.tip::before{background:var(--mastered)}
  .callout.tip{background:var(--mastered-soft);border-color:#CFE9DD}
  .callout.warn::before{background:var(--trap)}
  .callout.warn{background:var(--trap-soft);border-color:#F2D2DC}
  .callout .ct{
    font-family:var(--mono);font-size:10px;letter-spacing:.6px;
    text-transform:uppercase;font-weight:600;display:block;margin-bottom:4px;
  }
  .callout.tip .ct{color:var(--mastered)}
  .callout.warn .ct{color:var(--trap)}

  .example{
    margin:4px 0 16px;padding:15px 17px;border-radius:11px;
    background:#13141A;color:#E9EAF0;font-size:14px;line-height:1.65;
  }
  .example .ct{
    font-family:var(--mono);font-size:10px;letter-spacing:.6px;
    text-transform:uppercase;color:#8E93A8;display:block;margin-bottom:6px;
  }
  .example b{color:#fff}
  .example code{background:rgba(255,255,255,.1);color:#C9C2FF}

  /* mnemonic — the memory hook signature */
  .hook{
    margin:8px 0 4px;display:flex;gap:14px;align-items:stretch;
    border-radius:13px;overflow:hidden;border:1px solid var(--line);
    background:var(--surface);box-shadow:var(--shadow);
  }
  .hook .icon{
    flex:none;width:54px;display:flex;align-items:center;justify-content:center;
    background:var(--ink);color:#fff;font-size:22px;
  }
  .hook .h-body{padding:13px 16px 14px}
  .hook .h-lab{
    font-family:var(--mono);font-size:10px;letter-spacing:.8px;
    text-transform:uppercase;color:var(--ink-faint);margin-bottom:4px;
  }
  .hook .h-text{
    font-family:var(--mono);font-size:14.5px;font-weight:500;
    color:var(--ink);line-height:1.5;
  }

  .takeaways{margin:0;padding:0;list-style:none}
  .takeaways li{
    position:relative;padding:8px 0 8px 28px;font-size:14.5px;
    line-height:1.55;border-bottom:1px solid var(--line-soft);
  }
  .takeaways li:last-child{border-bottom:none}
  .takeaways li::before{
    content:"\2713";position:absolute;left:2px;top:8px;
    color:var(--mastered);font-weight:700;font-size:14px;
  }
  .traps{margin:0;padding:0;list-style:none}
  .traps li{
    position:relative;padding:8px 0 8px 28px;font-size:14.5px;
    line-height:1.55;border-bottom:1px solid var(--line-soft);color:#3A2530;
  }
  .traps li:last-child{border-bottom:none}
  .traps li::before{
    content:"\2715";position:absolute;left:3px;top:8px;
    color:var(--trap);font-weight:700;font-size:13px;
  }

  /* status footer */
  .statusbar{
    position:sticky;bottom:0;margin-top:42px;
    background:rgba(255,255,255,.86);backdrop-filter:blur(8px);
    border:1px solid var(--line);border-radius:14px;
    padding:13px 16px;display:flex;align-items:center;gap:10px;
    box-shadow:var(--shadow);
  }
  .statusbar .lab{
    font-family:var(--mono);font-size:11px;color:var(--ink-faint);
    text-transform:uppercase;letter-spacing:.5px;margin-right:2px;
  }
  .st-btn{
    flex:1;font-family:var(--display);font-size:13.5px;font-weight:600;
    padding:10px 12px;border-radius:10px;cursor:pointer;
    border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);
    transition:all .14s;
  }
  .st-btn:hover{border-color:var(--ink-faint)}
  .st-btn.on[data-v="todo"]{background:var(--ink);color:#fff;border-color:var(--ink)}
  .st-btn.on[data-v="learning"]{background:var(--learning);color:#fff;border-color:var(--learning)}
  .st-btn.on[data-v="mastered"]{background:var(--mastered);color:#fff;border-color:var(--mastered)}

  .empty{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:100%;color:var(--ink-faint);text-align:center;padding:40px;
  }
  .empty .big{font-family:var(--display);font-size:20px;color:var(--ink-soft);margin-bottom:6px}

  .note-flag{
    font-family:var(--mono);font-size:10.5px;color:var(--learning);
    background:var(--learning-soft);padding:3px 8px;border-radius:6px;
  }

  /* mobile */
  .mtoggle{display:none}
  @media (max-width:860px){
    .app{grid-template-columns:1fr;height:auto;min-height:100vh}
    .rail{height:auto;border-right:none;border-bottom:1px solid #000;position:sticky;top:0;z-index:20}
    .list{max-height:46vh}
    .rail.collapsed .rail-controls,
    .rail.collapsed .list{display:none}
    .mtoggle{
      display:flex;align-items:center;gap:8px;cursor:pointer;
      font-family:var(--mono);font-size:11px;color:var(--rail-soft);
      margin-top:14px;background:var(--rail-2);border:1px solid var(--rail-3);
      padding:8px 11px;border-radius:8px;justify-content:center;
    }
    .sheet{height:auto;overflow:visible}
    .sheet-inner{padding:26px 20px 90px}
    .prompt{font-size:21px}
    .statusbar{position:static}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
</style>

<div class="app">
  <aside class="rail" id="rail">
    <div class="rail-head">
      <div class="brand">
        <span class="mark">A/B</span>
        <div>
          <h1>Experiment Design Trainer</h1>
          <span class="sub">marketplace DS · interview reps</span>
        </div>
      </div>
      <div class="conf">
        <div class="conf-top"><span>Confidence</span><span><b id="confPct">0%</b> mastered</span></div>
        <div class="conf-bar"><div class="conf-seg m" id="segM"></div><div class="conf-seg l" id="segL"></div></div>
        <div class="conf-legend">
          <span><i class="dot m"></i><span id="cM">0</span> mastered</span>
          <span><i class="dot l"></i><span id="cL">0</span> learning</span>
          <span><i class="dot t"></i><span id="cT">0</span> to do</span>
        </div>
      </div>
      <div class="mtoggle" id="mtoggle">Browse concepts ▾</div>
    </div>
    <div class="rail-controls">
      <input class="search" id="search" placeholder="Search concepts, e.g. power, guardrail, p-value…" />
      <div class="filters" id="topicFilters"></div>
      <div class="filters" id="statusFilters" style="margin-top:8px"></div>
    </div>
    <div class="list" id="list"></div>
  </aside>

  <main class="sheet" id="sheet">
    <div class="empty" id="empty">
      <div class="big">Pick a concept to start a rep.</div>
      <div>Each card: prompt → try it cold → reveal the model answer → mark your status.</div>
    </div>
  </main>
</div>

<script>
/* ============================ CONTENT ============================ */
const DATA = [
  {
    id:"checklist", num:"Q1", title:"Experiment Design",
    topic:"Experiment Design", difficulty:"Core",
    prompt:"Before launching an A/B test, what do you lock down — and in what order?",
    why:"At a marketplace, leaving out guardrails or a pre-registered plan is a red flag. They're checking whether your rigour comes out as a calm checklist or as a tangle.",
    answer:[
      {p:"Lock six things, in writing, before anyone is bucketed:"},
      {steps:[
        {b:"Hypothesis",t:"Directional. e.g. cutting the delivery fee by €1 increases completed orders per user. Null: no difference; alternative: treatment > control."},
        {b:"Primary metric",t:"Exactly one — the metric the decision hinges on, and what you powered the test on."},
        {b:"Guardrail metrics",t:"Things that must not degrade: contribution margin per order, courier utilisation / unmet demand, cancellation rate. A fee cut can win on volume and still be a net loss."},
        {b:"Randomisation unit & analysis unit",t:"User-level if effects are isolated; for shared supply, flag interference → geo or switchback. State that the analysis unit matches the randomisation unit."},
        {b:"Power & sizing → minimum runtime",t:"Baseline rate, the MDE you actually care about (say 2% relative), α 5%, power 80% → required N per arm → therefore ≥1–2 full weeks regardless of how fast you hit N."},
        {b:"Analysis plan (pre-registered)",t:"The test you'll run, outlier handling, segments, and the explicit decision rule: ship only if the primary clears its MDE AND no guardrail breaches its threshold."}
      ]},
      {callout:"tip|Pre-commit a sample-ratio (SRM) check on day one to catch any assignment bug before you read results."}
    ],
    mnemonic:"Have Pretty Good Units, Plan Ahead → Hypothesis · Primary · Guardrails · Unit · Power/Duration · Analysis plan",
    takeaways:[
      "Deliver it as a boring checklist you could recite half-asleep — rigour reads as calm structure.",
      "Name guardrails before they ask. At a marketplace, omitting them unprompted is the tell.",
      "\u201CPre-registered analysis plan\u201D is the single phrase that most separates senior from mid — it's what stops p-hacking."
    ],
    traps:[
      "Hypothesis showing up last and getting knotted (\u201Cif null equals alternate…\u201D).",
      "Implying power but never closing the loop to \u201Ctherefore N users, therefore X days.\u201D"
    ]
  },
  {
    id:"stat-vs-practical", num:"Q2", title:"Fundamentals",
    topic:"Fundamentals", difficulty:"Core",
    prompt:"Statistical vs practical significance — and a Bolt example where significant ≠ worth shipping.",
    why:"Separates people who chase p < 0.05 from people who make business decisions. The example is the part they actually grade.",
    answer:[
      {p:"<b>Statistical significance</b> — whether the observed difference is unlikely to be due to chance, given the variance in the data. <b>Practical significance</b> — whether the magnitude of the effect is big enough to matter to the business, net of cost."},
      {callout:"tip|The clean framing: statistical significance answers \u201Cis there an effect?\u201D; practical significance answers \u201Cis it large enough to justify acting on it?\u201D A huge sample can make a 0.1% lift significant — real, but meaningless."},
      {h:"The Bolt example (this is what scores)"},
      {example:"A new checkout layout lifts conversion by <b>0.15%</b> on 4M users, p < 0.01 — real, but below the threshold that justifies the eng cost, QA across 16 markets, and added maintenance. Significant, not practically significant → don't ship.\n\nThe more dangerous version: a €1 fee cut lifts orders by <b>3%</b>, significant — but contribution margin per order drops more than the volume recovers. A significant <b>win</b> on the primary, a net-negative decision. That's why you set a practical threshold (an MDE tied to cost) <b>before</b> the test."}
    ],
    mnemonic:"Significant = is it real. Practical = is it big enough to matter.",
    takeaways:[
      "Don't describe practical significance as \u201Clooking at treatment vs control without the statistics.\u201D It's about magnitude vs cost.",
      "Always land the example. When the question says \u201Cgive me a Bolt example,\u201D the example is the answer.",
      "Define in one breath, then immediately \u201Cfor example, at Bolt…\u201D"
    ],
    traps:[
      "Defining practical significance as \u201Cnot using statistics.\u201D",

    prompt:"A PM says: \u201CLet's check the dashboard daily and stop the moment it hits significance.\u201D What's wrong — and two correct alternatives?",

    answer:[
      {p:"This is the <b>peeking problem</b>. Each time you look and the threshold is p < 0.05, you give the test another independent chance to cross the line by random noise. An A/A test (no real difference) wanders up and down; stop the instant it dips under 0.05 and you'll eventually catch a random dip even though nothing is happening. Your real false-positive rate isn't 5% — daily peeking over a few weeks can push it to <b>20–30%+</b>."},

      {h:"Two correct alternatives"},
      {steps:[
        {b:"Fixed-horizon test",t:"Pre-commit the sample size and runtime up front (power calc + minimum 1–2 weeks) and only read the result at the end. Simplest and most defensible."},
        {b:"Sequential / always-valid inference",t:"If they genuinely need to stop early: SPRT, group-sequential boundaries (O'Brien-Fleming / Pocock), or always-valid p-values / confidence sequences (mSPRT). These spend \u03B1 across looks so the overall false-positive rate stays at 5% while you peek legitimately."}

    takeaways:[

      "Always end by addressing the PM's underlying need — the stakeholder-management signal."

    answer:[
      {p:"A p-value is the probability of observing a result <b>at least as extreme</b> as what we saw, <b>assuming the null hypothesis is true</b> (and the test's modelling assumptions hold). The conditional \u201Cgiven the null is true\u201D is everything."},

      {steps:[
        {b:"\u201Cp = 0.03 means a 97% chance the treatment works.\u201D",t:"Wrong. That's a Bayesian quantity requiring a prior. p = 0.03 means: if there were no effect, we'd see data this extreme only 3% of the time."},

      {callout:"tip|Pocket third: a small p-value doesn't mean the effect is large or important — that's practical significance. Huge N gives a trivial effect a tiny p."}

    mnemonic:"P(data this extreme | null true) — not P(null | data).",
    takeaways:[
      "Definition hinges on the conditional: assuming the null is true.",
      "Two killer misreads: \u201Cprobability the hypothesis is true\u201D (inversion fallacy) and \u201Cp > 0.05 = no effect\u201D (underpowered \u2260 null true).",
      "Being the person who corrects the \u201C97% chance it works\u201D misread is the senior signal."

  {
    id:"math-autocorr-se", num:"M1", title:"Math Foundations",
    topic:"Math Foundations", difficulty:"Hard", note:"Mechanism derivation",
    prompt:"Mechanically — why does positive autocorrelation make the naive standard error too small?",
    why:"\u201CAutocorrelation inflates your SE\u201D is something people repeat without being able to defend. Deriving it from the variance-of-a-sum formula is what separates someone who's actually run switchbacks from someone who's memorised the term.",
    answer:[
      {p:"Treat your estimate as an average over n time blocks: <code>estimate = (1/n)\u00B7\u03A3X\u1D62</code>. The variance of that average is <code>Var(mean) = (1/n\u00B2)\u00B7Var(\u03A3X\u1D62)</code>, and the crux is how <code>Var(\u03A3X\u1D62)</code> expands:"},
      {example:"Var(\u03A3X\u1D62) = \u03A3Var(X\u1D62) + \u03A3\u03A3Cov(X\u1D62,X\u2C7C)  for i\u2260j\n\n<b>i.i.d. case (what naive SE assumes):</b> every Cov term = 0, so Var(\u03A3X\u1D62) = n\u00B7\u03C3\u00B2 → SE = \u03C3/\u221An. That's the textbook formula — but it's only correct because every covariance was assumed zero.\n\n<b>Autocorrelated case (what's actually true):</b> consecutive blocks are positively correlated, so Cov(X\u1D62,X\u2C7C) > 0 for nearby blocks. The true variance is n\u00B7\u03C3\u00B2 PLUS those positive terms — bigger than the naive formula assumes. But the naive formula still divides as if they were zero, so it reports an SE that's systematically too small."},
      {h:"The intuitive version to say in the room"},
      {p:"\u201CIf 9am and 10am demand are nearly the same, my second block barely tells me anything new — it's largely a repeat of the first. So 24 hourly blocks aren't 24 independent data points; the effective sample size is smaller, maybe 8\u201310 truly independent observations. The naive SE uses \u221A24; the honest SE should use \u221A(effective n), which is smaller — so the SE has to be larger.\u201D"},
      {h:"Why it's dangerous"},
      {p:"Smaller SE → bigger test statistic (\u03B4/SE) → smaller p-value → narrower CI → you declare significance more often than you're entitled to. Your nominal 5% false-positive rate is actually much higher — you ship pricing changes that did nothing."},
      {h:"What the fixes actually do"},
      {bullets:[
        "<b>HAC / Newey-West:</b> explicitly estimates the non-zero covariance terms and adds them back into the variance — directly repairing the formula.",
        "<b>Cluster-robust (by day/region):</b> lets observations correlate freely within a cluster, only assuming independence between clusters.",
        "<b>Randomisation inference:</b> skips the formula entirely — re-randomises the sequence to build the null empirically, so autocorrelation is automatically reflected."
      ]}
    ],
    mnemonic:"Positive autocorrelation → positive covariance terms the naive formula drops → true variance bigger → naive SE too small.",
    takeaways:[
      "The naive σ/√n formula silently assumes every cross-covariance term is zero.",
      "Effective sample size framing is the cleanest one-liner: correlated blocks carry less new information, so n_eff < raw block count.",
      "All three fixes amount to 'stop pretending the off-diagonal covariances are zero.'"
    ],
    traps:[
      "Asserting autocorrelation inflates the SE without being able to derive why.",
      "Confusing this with the carryover problem (Q17) — this is purely about the SE, not the point estimate."
    ]
  },
  {
    id:"math-low-traffic-power", num:"M2", title:"Math Foundations",
    topic:"Math Foundations", difficulty:"Hard", note:"Unifies Q4/Q10/Q13",
    prompt:"Mathematically, why do CUPED, raising the MDE, switchbacks, running longer, and pooling markets all 'recover power' in a low-traffic market?",
    why:"The tactics in Q4 can sound like a grab-bag of tricks. The senior move is recognising they're all the same equation, attacking different terms — and being able to say so in one sentence.",
    answer:[
      {p:"Power is driven by the signal-to-noise ratio. For a difference in means: <code>SE = \u03C3\u00B7\u221A(2/n_eff)</code>, so <code>\u03B4/SE = (\u03B4/\u03C3)\u00B7\u221A(n_eff/2)</code>. There are exactly three knobs: effect <code>\u03B4</code> (numerator), noise <code>\u03C3</code> (denominator), and effective sample size <code>n_eff</code>. A low-traffic market is short on raw n — so every lever attacks \u03C3, \u03B4, or n_eff some other way."},
      {h:"Each lever, mapped to a term"},
      {steps:[
        {b:"CUPED → shrinks \u03C3",t:"Var(Y_adjusted) = Var(Y)\u00B7(1\u2212\u03C1\u00B2) where \u03C1 is the pre-period\u2013outcome correlation. Since required n \u221D \u03C3\u00B2, a 50% variance cut (\u03C1\u22480.7) needs ~50% fewer users. \u03C3\u00B2 and n are interchangeable for power — cutting \u03C3\u00B2 in half IS doubling n."},
        {b:"Raise the MDE → increases \u03B4",t:"Required n \u221D \u03C3\u00B2/\u03B4\u00B2 — \u03B4 is SQUARED. Detecting 10% instead of 2% (5\u00D7 larger \u03B4) cuts required n by 25\u00D7 (5\u00B2). That's why a market's fixed n pins down the smallest \u03B4 it can resolve."},
        {b:"Switchback/geo-time → manufactures n_eff",t:"Swaps a population-limited n for a time-limited n (a small city run for 4 weeks at hourly blocks \u2248 672 time blocks). Caveat: those blocks are autocorrelated (M1), so n_eff < raw block count — but even discounted, usually still dwarfs user-level n."},
        {b:"Run longer → grows n, but SE falls only as \u221An",t:"Diminishing returns: halving the SE requires 4\u00D7 the data/time, not 2\u00D7."},
        {b:"Pool markets → adds independent n",t:"SE_pooled = \u03C3\u00B7\u221A(2/\u03A3n\u2096) — only valid if the treatment effect is genuinely homogeneous across the pooled markets (else you're averaging heterogeneous effects, the Q14 problem). Test for heterogeneity before trusting the pooled number."}
      ]},
      {h:"When the equation refuses to cooperate"},
      {p:"Plug the market's max achievable n, irreducible \u03C3 (post-CUPED), and the business-required \u03B4 into <code>Power = \u03A6((\u03B4/\u03C3)\u00B7\u221A(n_eff/2) \u2212 z)</code>. If it evaluates to, say, 35% even after every lever is maxed, you have a 65% chance of missing a real effect — a null result tells you almost nothing. Reporting the achieved power is a quantified, defensible reason not to run it, not a vibe."},
      {callout:"tip|The one inequality underneath everything: \u03B4_business \u2265 \u03B4_min = c\u00B7\u03C3/\u221An_eff (c \u2248 2.8 for 80% power, 5% \u03B1). You either shrink \u03C3, raise n_eff, accept a larger \u03B4_business, or admit it's unsolvable here."}
    ],
    mnemonic:"Required n \u221D \u03C3\u00B2/\u03B4\u00B2 — every power lever is attacking \u03C3, \u03B4, or n_eff in that one equation.",
    takeaways:[
      "δ is squared in the n formula — small MDEs are brutally expensive, large ones cheap.",
      "CUPED's variance cut and a sample-size increase are mathematically interchangeable for power.",
      "Pooling only works under homogeneity — check before trusting it (ties back to Q14).",
      "Room-ready sentence: 'Required n scales as σ²/δ², so I attack σ (CUPED), δ (raise the MDE), or manufacture n_eff (switchback/pooling) — and if δ_business is still below δ_min, I report achieved power and don't run it.'"
    ],
    traps:[
      "Listing the tactics as a grab-bag instead of recognising they're one equation.",
      "Pooling markets without checking for treatment-effect heterogeneity."
    ]
  },

    id:"srm", num:"Q20", title:"Analysis & Pitfalls",
    topic:"Analysis & Pitfalls", difficulty:"Core",
    prompt:"You expected a 50/50 split but observe 52/48. What is Sample Ratio Mismatch, how do you detect it, and why must you stop before reading results?",
    why:"SRM is the single most important sanity check, and a 2% imbalance on large N is almost never chance. It usually signals a bug that biases the whole experiment \u2014 reading results through a broken assignment is worse than no test.",
    answer:[
      {p:"<b>SRM</b> = the observed allocation between arms differs from the intended ratio by more than chance allows. On large N, even a 51/49 split can be wildly significant \u2014 randomisation almost never drifts that far on its own."},
      {h:"How to detect it"},
      {p:"Run a chi-squared goodness-of-fit test of observed counts against the expected ratio. A tiny p-value (say < 0.001) on the split itself means SRM. Make this an automated day-one gate, before anyone looks at the metric."},
      {h:"Why you must stop"},
      {bullets:[
        "SRM means the assignment mechanism is broken \u2014 and whatever broke it is almost certainly <b>correlated with the outcome</b>, so the groups aren't comparable. The treatment-vs-control gap is now confounded.",
        "Common causes: bot/crawler traffic landing in one arm, a redirect or latency difference that drops users from treatment, logging that fires asymmetrically, a bad bucketing hash, or triggering that differs by arm.",
        "Any 'result' you read is uninterpretable \u2014 you can't tell the treatment effect from the assignment bias. Fix the cause, don't 'adjust' your way around it."
      ]},
      {callout:"warn|SRM invalidates the experiment; it is not a small nuisance to footnote. A significant primary metric on top of an SRM is a red flag, not a win."}
    ],
    mnemonic:"SRM = broken randomisation \u2192 confounded groups \u2192 result uninterpretable. Gate it on day one.",
    takeaways:[
      "Detect with a chi-squared test on the split itself; automate it as a launch gate.",
      "The danger is that the cause of the imbalance correlates with the outcome \u2014 so the groups aren't comparable.",
      "On SRM you stop and fix the cause; you never reinterpret the metric through a broken assignment."
    ],
    traps:[
      "Dismissing a 52/48 split as 'close enough' \u2014 on large N it's almost never chance.",
      "Reading the primary metric anyway and reporting a 'win.'"
    ]
  },

    why:"Simpson's paradox is a favourite because it tests whether you reason about confounding and weighting rather than reflexively trusting the aggregate. The 'which number' answer reveals whether you understand the mechanism.",
    answer:[
      {p:"This is <b>Simpson's paradox</b>: a trend that holds within every subgroup reverses when the subgroups are pooled, because the segments have different baseline rates AND different treatment/control mixes."},

      {example:"Suppose Market A converts at 2% and Market B at 20%. If treatment happens to be over-represented in low-baseline Market A and control in high-baseline Market B, the pooled treatment average gets dragged down by A's low rate \u2014 even though treatment beat control in BOTH A and B. The aggregate reflects the segment MIX, not the treatment effect.\n\nUsually this means an <b>SRM within segments</b>: assignment ratios differ by segment."},
      {h:"Which number to trust"},
      {bullets:[
        "<b>Trust the segment-level (conditional) effects</b> when the mix imbalance is an artefact of broken/uneven assignment \u2014 the within-segment comparison is the clean apples-to-apples one.",
        "<b>Reconcile, don't just pick:</b> compute a properly weighted aggregate (e.g. weight each segment by its true population share, or use a regression that controls for segment) so the overall number reflects the real population, not the experiment's accidental mix.",

    id:"multiple-comparisons", num:"Q22", title:"Analysis & Pitfalls",
    topic:"Analysis & Pitfalls", difficulty:"Core",
    prompt:"You tested 8 metrics across 4 segments \u2014 32 comparisons \u2014 and 2 came back 'significant.' What's the problem and how do you handle it?",
    why:"With dozens of concurrent tests and rich segmentation, false discovery is rampant. They want you to recognise the multiplicity, quantify the expected false positives, and apply the right correction \u2014 without killing all power.",
    answer:[
      {p:"The problem is <b>multiple comparisons</b>: every test at \u03B1 = 5% has a 5% chance of a false positive under the null. Run 32 and you'd expect ~1.6 'significant' results by pure chance even if nothing works. Finding 2 is exactly what noise predicts \u2014 so on their own they're not evidence of anything."},
      {h:"How to handle it"},
      {steps:[
        {b:"Pre-register one primary metric",t:"The cleanest defence. The decision hinges on the pre-specified primary; everything else is exploratory and clearly labelled as such. Most of the multiplicity problem disappears if only one comparison is confirmatory."},
        {b:"Correct for the rest",t:"Bonferroni (divide \u03B1 by the number of tests) is simple but conservative \u2014 good when any false positive is costly. Benjamini-Hochberg (control the false discovery rate) is less harsh and better when you're screening many metrics and can tolerate some false positives among the 'discoveries.'"},

    topic:"Test Statistics", difficulty:"Core",
    prompt:"What is a z-test, when do you reach for it, and how is the z-statistic actually built?",

    answer:[
      {p:"A z-statistic measures how many standard errors your estimate sits from the null value, <b>assuming you know (or can treat as known) the standard error</b>. You compare it to the standard normal distribution to get a p-value."},
      {example:"<b>One-sample:</b>  z = (x\u0304 \u2212 \u03BC\u2080) / (\u03C3/\u221An)\n<b>Two-sample (means):</b>  z = (x\u0304\u2081 \u2212 x\u0304\u2082) / \u221A(\u03C3\u2081\u00B2/n\u2081 + \u03C3\u2082\u00B2/n\u2082)\n\nNumerator = the effect you observed. Denominator = the standard error. |z| > 1.96 \u2192 significant at 5% two-sided."},
      {h:"When to use it"},
      {bullets:[
        "<b>Population variance known</b> \u2014 rare in practice, OR",
        "<b>Large sample (n \u2273 30, usually far more)</b> so the Central Limit Theorem makes the sampling distribution normal and the estimated SE is essentially as good as known. At Bolt's traffic, this is the common case.",
        "<b>Proportions / rates</b> \u2014 conversion, cancellation, redemption \u2014 are almost always tested with a z-test (see S3)."
      ]},
      {h:"Marketplace example"},
      {p:"Comparing order-conversion between treatment and control across 800k users per arm: with N that large you use a two-proportion <b>z</b>-test \u2014 the normal approximation is excellent and the t-correction is negligible."},
      {callout:"tip|Mental model: z = signal / noise, where noise is a standard error you trust because n is big. Everything downstream (CI, p-value) is just reading z against the normal curve."}
    ],
    mnemonic:"z = (estimate \u2212 null) / SE, compared to the normal. Use it when variance is known or n is large.",
    takeaways:[
      "z-statistic = how many standard errors the effect is from the null, against the standard normal.",
      "Valid when variance is known OR n is large enough for the CLT \u2014 the usual case at marketplace scale.",
      "Proportion/rate tests are z-tests; |z| > 1.96 is the 5% two-sided threshold."
    ],
    traps:[

  },

  {
    id:"t-statistic", num:"S2", title:"Test Statistics",
    topic:"Test Statistics", difficulty:"Core",
    prompt:"What is a t-test and the t-statistic? How does it differ from z, and which version do you use for two arms?",
    why:"The t-test is the honest default when you estimate the variance from the data \u2014 which you almost always do. The senior detail is reaching for Welch's, not the pooled t, when arms differ.",
    answer:[
      {p:"The t-statistic has the same shape as z \u2014 effect over standard error \u2014 but you <b>estimate the standard deviation from the sample</b> (<code>s</code>) instead of knowing it. That extra uncertainty means you compare against the <b>t-distribution</b>, which has fatter tails than the normal."},
      {example:"<b>One-sample:</b>  t = (x\u0304 \u2212 \u03BC\u2080) / (s/\u221An)\n<b>Welch's two-sample (default):</b>  t = (x\u0304\u2081 \u2212 x\u0304\u2082) / \u221A(s\u2081\u00B2/n\u2081 + s\u2082\u00B2/n\u2082)\n\ns = sample standard deviation. Fatter tails \u2192 you need a slightly larger t than z to clear significance at small n."},
      {h:"t vs z"},
      {bullets:[
        "z assumes the SE is known; t accounts for the fact that you <b>estimated</b> it \u2192 wider intervals at small n.",
        "As n grows, the t-distribution converges to the normal \u2014 at large n, t \u2248 z (the difference is negligible above a few hundred observations)."
      ]},
      {h:"Which two-sample version"},
      {p:"Use <b>Welch's t-test</b> by default \u2014 it does <b>not</b> assume equal variances or equal sample sizes between arms. The older 'pooled' / Student's t assumes both, which is fragile: a treatment can change the variance, not just the mean."},
      {h:"Marketplace example"},
      {p:"Comparing <b>average basket value per order</b> between arms in a mid-size market (continuous, skewed, moderate n). You estimate the SD from the data, so it's a t-test \u2014 and because treatment may widen the spread of baskets, you use Welch's."},
      {callout:"warn|Continuous + heavily skewed (GMV, basket value) + small n: even Welch's t leans on approximate normality of the mean. If n is small and the tail is brutal, switch to a bootstrap CI or a rank test (Mann-Whitney)."}
    ],
    mnemonic:"t = z but with the SD estimated from data \u2192 fatter tails. Default to Welch's, not pooled.",
    takeaways:[
      "t-statistic is effect/SE with SD estimated from the sample, read against the t-distribution.",
      "t \u2192 z as n grows; the difference only matters at small n.",
      "Default to Welch's two-sample t \u2014 it doesn't assume equal variance or equal n."
    ],
    traps:[
      "Using pooled/Student's t (equal-variance assumption) when arms differ in spread or size.",
      "Trusting t on tiny, heavily skewed samples \u2014 reach for bootstrap or Mann-Whitney instead."
    ]
  },

/* ============================ STORAGE ============================ */
const mem = {}; // fallback if window.storage unavailable
async function sGet(k){
  try{ const r = await window.storage.get(k); return r ? r.value : null; }
  catch(e){ return (k in mem) ? mem[k] : null; }
}
async function sSet(k,v){
  try{ await window.storage.set(k,v); }
  catch(e){ mem[k]=v; }
}
async function sDel(k){
  try{ await window.storage.delete(k); }
  catch(e){ delete mem[k]; }
}

/* ============================ STATE ============================ */
const state = { status:{}, notes:{}, active:null, topic:"All", statusFilter:"All", query:"" };
const TOPICS = ["All", ...Array.from(new Set(DATA.map(d=>d.topic)))];
const STATUSES = [["All","All"],["To do","todo"],["Learning","learning"],["Mastered","mastered"]];

async function loadState(){
  for(const d of DATA){
    const st = await sGet("status:"+d.id); if(st) state.status[d.id]=st;
    const nt = await sGet("notes:"+d.id); if(nt) state.notes[d.id]=nt;
  }
}

/* ============================ HELPERS ============================ */
const $ = s => document.querySelector(s);
function md(t){
  return t
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/&lt;b&gt;/g,"<b>").replace(/&lt;\/b&gt;/g,"</b>")
    .replace(/&lt;code&gt;/g,"<code>").replace(/&lt;\/code&gt;/g,"</code>")
    .replace(/\n/g,"<br>");
}
const statusOf = id => state.status[id] || "todo";

/* ============================ RENDER: CONFIDENCE ============================ */
function renderConf(){
  const total = DATA.length;
  let m=0,l=0;
  DATA.forEach(d=>{const s=statusOf(d.id); if(s==="mastered")m++; else if(s==="learning")l++;});
  const t = total-m-l;
  $("#segM").style.width = (m/total*100)+"%";
  $("#segL").style.width = (l/total*100)+"%";
  $("#confPct").textContent = Math.round(m/total*100)+"%";
  $("#cM").textContent=m; $("#cL").textContent=l; $("#cT").textContent=t;
}

/* ============================ RENDER: FILTERS ============================ */
function renderFilters(){
  const tf = $("#topicFilters"); tf.innerHTML="";
  TOPICS.forEach(t=>{
    const c=document.createElement("div");
    c.className="chip"+(state.topic===t?" on":"");
    c.textContent=t;
    c.onclick=()=>{state.topic=t; renderFilters(); renderList();};
    tf.appendChild(c);
  });
  const sf=$("#statusFilters"); sf.innerHTML="";
  STATUSES.forEach(([label,val])=>{
    const c=document.createElement("div");
    c.className="chip"+(state.statusFilter===val?" on":"");
    c.textContent=label;
    c.onclick=()=>{state.statusFilter=val; renderFilters(); renderList();};
    sf.appendChild(c);
  });
}

/* ============================ RENDER: LIST ============================ */
function visibleItems(){
  const q=state.query.trim().toLowerCase();
  return DATA.filter(d=>{
    if(state.topic!=="All" && d.topic!==state.topic) return false;
    if(state.statusFilter!=="All" && statusOf(d.id)!==state.statusFilter) return false;
    if(q){
      const hay=(d.prompt+" "+d.topic+" "+d.title+" "+d.mnemonic+" "+d.takeaways.join(" ")).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}
function renderList(){
  const list=$("#list"); list.innerHTML="";
  const items=visibleItems();
  if(!items.length){
    list.innerHTML='<div class="grp-label" style="padding:24px 10px;color:var(--rail-soft)">No concepts match.</div>';
    return;
  }
  // group by topic
  const groups={};
  items.forEach(d=>{(groups[d.topic]=groups[d.topic]||[]).push(d);});
  Object.keys(groups).forEach(topic=>{
    const gl=document.createElement("div"); gl.className="grp-label"; gl.textContent=topic;
    list.appendChild(gl);
    groups[topic].forEach(d=>{
      const st=statusOf(d.id);
      const el=document.createElement("div");
      el.className="item"+(state.active===d.id?" active":"");
      el.dataset.st=st; el.dataset.id=d.id;
      const check = st==="mastered"?"\u2713":(st==="learning"?"\u25D0":"");
      const checkColor = st==="mastered"?"var(--mastered)":(st==="learning"?"var(--learning)":"transparent");
      el.innerHTML=`
        <span class="spine"></span>
        <span class="num">${d.num}</span>
        <span class="body">
          <span class="t">${md(d.prompt)}</span>
          <span class="meta">${d.difficulty}${d.note?" · "+d.note:""}</span>
        </span>
        <span class="check" style="color:${checkColor}">${check}</span>`;
      el.onclick=()=>openItem(d.id);
      list.appendChild(el);
    });
  });
}

/* ============================ RENDER: ANSWER BLOCKS ============================ */
function renderBlocks(blocks){
  let html="";
  for(const b of blocks){
    if(b.p){ html+=`<p>${md(b.p)}</p>`; }
    else if(b.h){ html+=`<h4>${md(b.h)}</h4>`; }
    else if(b.steps){
      html+="<ol class='steps'>";
      b.steps.forEach(s=>{ html+=`<li><b>${md(s.b)}</b>${md(s.t)}</li>`; });
      html+="</ol>";
    }
    else if(b.bullets){
      html+="<ul class='bullets'>";
      b.bullets.forEach(x=>{ html+=`<li>${md(x)}</li>`; });
      html+="</ul>";
    }
    else if(b.callout){
      const [tone,...rest]=b.callout.split("|");
      const text=rest.join("|");
      const label=tone==="warn"?"Watch out":"Key line";
      html+=`<div class="callout ${tone}"><span class="ct">${label}</span>${md(text)}</div>`;
    }
    else if(b.example){
      html+=`<div class="example"><span class="ct">Worked example</span>${md(b.example)}</div>`;
    }
  }
  return html;
}

/* ============================ RENDER: SHEET ============================ */
function openItem(id){
  state.active=id;
  renderList();
  const d=DATA.find(x=>x.id===id);
  const st=statusOf(id);
  const sheet=$("#sheet");
  const noteFlag = d.note?`<span class="note-flag">${d.note}</span>`:"";
  sheet.innerHTML=`
    <div class="sheet-inner">
      <div class="crumbs">
        <span class="tag">${d.topic}</span>
        <span class="tag diff" data-d="${d.difficulty}">${d.difficulty}</span>
        ${noteFlag}
        <span>${d.num}</span>
      </div>
      <div class="q-title">${d.title}</div>
      <p class="prompt">${md(d.prompt)}</p>

      <div class="why">
        <div class="lab">Why they ask</div>
        <p>${md(d.why)}</p>
      </div>

      <div class="scratch">
        <div class="lab"><span>Try it cold — your answer</span><span class="saved" id="savedFlag">saved</span></div>
        <textarea id="notes" placeholder="Draft your spoken answer here before revealing the model. Saved automatically.">${(state.notes[id]||"").replace(/</g,"&lt;")}</textarea>
      </div>

      <button class="reveal-btn" id="revealBtn">Reveal model answer <span class="kbd">SPACE</span></button>

      <div class="answer" id="answer">
        <div class="sec-rule"><span class="lab">Model answer</span><span class="ln"></span></div>
        ${renderBlocks(d.answer)}

        <div class="sec-rule"><span class="lab">Memory hook</span><span class="ln"></span></div>
        <div class="hook">
          <div class="icon">\u2693</div>
          <div class="h-body">
            <div class="h-lab">Mnemonic</div>
            <div class="h-text">${md(d.mnemonic)}</div>
          </div>
        </div>

        <div class="sec-rule"><span class="lab">Lock these in</span><span class="ln"></span></div>
        <ul class="takeaways">${d.takeaways.map(t=>`<li>${md(t)}</li>`).join("")}</ul>

        <div class="sec-rule"><span class="lab">Traps you've hit</span><span class="ln"></span></div>
        <ul class="traps">${d.traps.map(t=>`<li>${md(t)}</li>`).join("")}</ul>
      </div>

      <div class="statusbar">
        <span class="lab">Status</span>
        <button class="st-btn ${st==="todo"?"on":""}" data-v="todo">To do</button>
        <button class="st-btn ${st==="learning"?"on":""}" data-v="learning">Learning</button>
        <button class="st-btn ${st==="mastered"?"on":""}" data-v="mastered">Mastered</button>
      </div>
    </div>`;

  // reveal
  const ans=$("#answer"), rb=$("#revealBtn");
  rb.onclick=()=>{ ans.classList.add("show"); rb.style.display="none"; };

  // notes autosave
  const ta=$("#notes"), flag=$("#savedFlag");
  let timer=null;
  ta.addEventListener("input",()=>{
    state.notes[id]=ta.value;
    clearTimeout(timer);
    timer=setTimeout(async()=>{
      await sSet("notes:"+id, ta.value);
      flag.classList.add("show");
      setTimeout(()=>flag.classList.remove("show"),1200);
    },400);
  });

  // status buttons
  sheet.querySelectorAll(".st-btn").forEach(btn=>{
    btn.onclick=async()=>{
      const v=btn.dataset.v;
      state.status[id]=v;
      if(v==="todo") await sDel("status:"+id); else await sSet("status:"+id,v);
      sheet.querySelectorAll(".st-btn").forEach(b=>b.classList.toggle("on",b.dataset.v===v));
      renderConf(); renderList();
    };
  });

  // collapse mobile rail after pick
  if(window.innerWidth<=860){ $("#rail").classList.add("collapsed"); $("#mtoggle").textContent="Browse concepts \u25BE"; }
  sheet.scrollTop=0;
}

/* ============================ KEYBOARD ============================ */
document.addEventListener("keydown",(e)=>{
  if(e.target.tagName==="TEXTAREA"||e.target.tagName==="INPUT") return;
  const items=visibleItems();
  if(!items.length) return;
  const idx=items.findIndex(d=>d.id===state.active);
  if(e.key==="ArrowDown"||e.key==="j"){ e.preventDefault(); openItem(items[Math.min(items.length-1,idx+1<0?0:idx+1)].id); }
  else if(e.key==="ArrowUp"||e.key==="k"){ e.preventDefault(); openItem(items[Math.max(0,idx-1)].id); }
  else if(e.key===" "){ const rb=$("#revealBtn"); if(rb&&rb.style.display!=="none"){ e.preventDefault(); rb.click(); } }
});

/* ============================ WIRE-UP ============================ */
$("#search").addEventListener("input",e=>{ state.query=e.target.value; renderList(); });
$("#mtoggle").addEventListener("click",()=>{
  const r=$("#rail"); r.classList.toggle("collapsed");
  $("#mtoggle").textContent = r.classList.contains("collapsed") ? "Browse concepts \u25BE" : "Hide concepts \u25B4";
});

(async function init(){
  await loadState();
  renderConf(); renderFilters(); renderList();
})();
</script>
